# LDAP authentication against the OpenLDAP lab directory.
# NOTE: the LDAP plugin reads these as bare "ldap.*" properties (no "sonar." prefix),
# so they cannot be supplied via SONAR_* environment variables (those are always
# mapped to "sonar.*"). This file is the only reliable place to set them.
sonar.security.realm=LDAP
ldap.url=ldap://openldap:389
ldap.bindDn=cn=admin,dc=devops,dc=lab
ldap.bindPassword=__LDAP_ADMIN_PASSWORD__
ldap.user.baseDn=ou=people,dc=devops,dc=lab
ldap.user.request=(&(objectClass=inetOrgPerson)(uid={login}))
