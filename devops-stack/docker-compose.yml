services:
  # ===========================================
  # OpenLDAP - Simulated Active Directory
  # ===========================================
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    command: --copy-service
    environment:
      LDAP_ORGANISATION: "DevOps Lab"
      LDAP_DOMAIN: devops.lab
      LDAP_BASE_DN: "dc=devops,dc=lab"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
    ports:
      - "389:389"
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
      - ./ldap:/container/service/slapd/assets/config/bootstrap/ldif/custom
    restart: unless-stopped
    networks:
      - ci-network

  # ===========================================
  # GitLab - Source Code Management
  # ===========================================
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    hostname: gitlab.local
    ports:
      - "9003:9003"      # HTTP (GitLab listens on same port as external_url)
      - "9443:443"       # HTTPS
      - "2222:22"        # SSH for git operations
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        # External URL - update this to your actual hostname/IP
        external_url 'http://localhost:9003'

        # GitLab Shell SSH port
        gitlab_rails['gitlab_shell_ssh_port'] = 2222

        # Disable services not needed to reduce memory usage
        prometheus_monitoring['enable'] = false
        node_exporter['enable'] = false
        redis_exporter['enable'] = false
        postgres_exporter['enable'] = false
        gitlab_exporter['enable'] = false

        # PostgreSQL settings (using embedded)
        postgresql['shared_buffers'] = "256MB"

        # Puma (web server) settings
        puma['worker_processes'] = 2

        # Sidekiq settings
        sidekiq['max_concurrency'] = 10

        # GitLab settings for Jenkins integration
        gitlab_rails['webhook_timeout'] = 30

        # LDAP - simulated Active Directory domain login
        gitlab_rails['ldap_enabled'] = true
        gitlab_rails['ldap_servers'] = YAML.load <<-EOS
        main:
          label: 'Domain Login'
          host: 'openldap'
          port: 389
          uid: 'uid'
          encryption: 'plain'
          active_directory: false
          base: 'ou=people,dc=devops,dc=lab'
          bind_dn: 'cn=admin,dc=devops,dc=lab'
          password: '#{ENV['LDAP_ADMIN_PASSWORD']}'
        EOS
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    shm_size: '256m'
    restart: unless-stopped
    depends_on:
      - openldap
    networks:
      - ci-network

  # ===========================================
  # Jenkins - CI/CD Server
  # ===========================================
  jenkins:
    build: ./jenkins
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "9001:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
    restart: unless-stopped
    depends_on:
      - openldap
    networks:
      - ci-network

  # ===========================================
  # SonarQube - Code Quality Analysis
  # ===========================================
  sonarqube:
    build:
      context: ./sonarqube
      args:
        LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonar_db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    depends_on:
      - sonar_db
      - openldap
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped
    networks:
      - ci-network

  sonar_db:
    image: postgres:15
    container_name: sonar_db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ci-network

# ===========================================
# Networks
# ===========================================
networks:
  ci-network:
    driver: bridge
    name: ci-network

# ===========================================
# Volumes
# ===========================================
volumes:
  openldap_data:
  openldap_config:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  jenkins_home:
  sonarqube_data:
  sonarqube_logs:
  sonar_db_data:
